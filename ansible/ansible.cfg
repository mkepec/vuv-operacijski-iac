[defaults]
inventory         = inventory.yml
remote_user       = ansible
private_key_file  = ~/.ssh/id_ed25519
host_key_checking = False
retry_files_enabled = False
stdout_callback   = yaml
forks             = 20

[privilege_escalation]
become          = True
become_method   = sudo
become_user     = root
become_ask_pass = False

[ssh_connection]
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=300s -o ProxyJump=root@135.181.128.170
