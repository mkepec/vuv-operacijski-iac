all:
  children:
    students:
      vars:
        # Group vars — identical across all students
        exam_repo_url: "http://172.16.16.121/repo"
        exam_service_enable: crond
        exam_service_disable: rsyslog
        exam_package_remove: tmux
        exam_package_required: vim-enhanced
        exam_find_dir_size: /etc
        exam_find_dir_perms: /var
        exam_planted_data_dir: /var/exam-data
        exam_planted_etc_dir: /etc/exam-data
      hosts:
        student-01:
          ansible_host: 172.16.16.101
          exam_variant: alpha
          exam_dir: exam-alpha
          exam_username: dbadmin1
          exam_gid: 40001
          exam_expiry: "2026-11-30"
          exam_workspace: dbteam-workspace-alpha
          exam_mount: /mnt/exam-disk-alpha
          exam_mount_text: "alpha disk mounted"
          exam_extra_package: tree
