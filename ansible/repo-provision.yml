---
# Provision the repo VM (172.16.16.121) before any exam.
# Sets up Apache + DNF repo + exam portal.
# Run with: ansible-playbook repo-provision.yml

# Play 1: deploy exam portal (20 per-student pages + index)
- name: Deploy exam portal HTML
  hosts: reposervers
  become: true
  gather_facts: false

  tasks:
    - name: Create exam portal directory
      ansible.builtin.file:
        path: /var/www/html/exam
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy per-student task sheet pages
      ansible.builtin.template:
        src: roles/exam-provision/templates/exam-task-sheet.html.j2
        dest: "/var/www/html/exam/{{ item }}.html"
        owner: root
        group: root
        mode: "0644"
      loop: "{{ groups['students'] | sort }}"
      vars:
        # Make the target student's hostvars available as top-level vars in the template
        inventory_hostname: "{{ item }}"
        exam_variant: "{{ hostvars[item].exam_variant }}"
        exam_dir: "{{ hostvars[item].exam_dir }}"
        exam_username: "{{ hostvars[item].exam_username }}"
        exam_gid: "{{ hostvars[item].exam_gid }}"
        exam_expiry: "{{ hostvars[item].exam_expiry }}"
        exam_workspace: "{{ hostvars[item].exam_workspace }}"
        exam_mount: "{{ hostvars[item].exam_mount }}"
        exam_mount_text: "{{ hostvars[item].exam_mount_text }}"
        exam_extra_package: "{{ hostvars[item].exam_extra_package }}"

    - name: Deploy exam portal index page
      ansible.builtin.template:
        src: roles/exam-provision/templates/exam-index.html.j2
        dest: /var/www/html/exam/index.html
        owner: root
        group: root
        mode: "0644"

# Play 2: repo setup
- name: Provision exam repo VM
  hosts: reposervers
  become: true

  vars:
    repo_dir: /var/www/html/repo
    repo_packages:
      - tree
      - wget
      - zip
      - unzip
      - bc
      - nano
      - dos2unix
      - words
      - lsof
      - rsync
      - vim-enhanced

  tasks:
    - name: Install Apache and createrepo
      ansible.builtin.dnf:
        name:
          - httpd
          - createrepo_c
        state: present

    - name: Create repo directory
      ansible.builtin.file:
        path: "{{ repo_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download repo packages
      ansible.builtin.shell:
        cmd: dnf download --resolve --destdir={{ repo_dir }} {{ repo_packages | join(' ') }}
      changed_when: true

    - name: Run createrepo to generate repo metadata
      ansible.builtin.command:
        cmd: createrepo_c {{ repo_dir }}
      changed_when: true

    - name: Enable and start httpd
      ansible.builtin.service:
        name: httpd
        state: started
        enabled: true

    - name: Allow HTTP through firewall (if firewalld is running)
      ansible.posix.firewalld:
        service: http
        permanent: true
        state: enabled
        immediate: true
      when: ansible_facts.services['firewalld.service'] is defined and
            ansible_facts.services['firewalld.service'].state == 'running'

    - name: Verify repo is reachable (check repomd.xml exists)
      ansible.builtin.stat:
        path: "{{ repo_dir }}/repodata/repomd.xml"
      register: repomd
      failed_when: not repomd.stat.exists
